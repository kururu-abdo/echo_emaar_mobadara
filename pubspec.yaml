name: echoemaar_commerce
description: A full-featured e-commerce mobile application with Odoo backend
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # HTTP & API
  http: ^1.6.0
  dio: ^5.3.3
  retrofit: ^4.0.3
  json_annotation: ^4.8.1

  # Odoo Integration
  odoo_rpc: ^0.7.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Firebase (Optional - for push notifications, analytics)
  firebase_core: ^2.20.0
  firebase_auth: ^4.12.1
  firebase_messaging: ^14.7.3
  firebase_analytics: ^10.7.0

  # Image Handling
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4

  # UI & Navigation
  go_router: ^12.1.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  badges: ^3.1.2
  
  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^5.0.1
  permission_handler: ^11.0.1
  url_launcher: ^6.2.1
  path_provider: ^2.1.1
  logger: ^2.0.2+1

  # Form Validation
  formz: ^0.6.1

  # Phone Number
  intl_phone_number_input: ^0.7.4
  dartz: ^0.10.1
  provider: ^6.1.5+1
  internet_connection_checker_plus: ^2.2.0
  lottie: ^3.3.2
  easy_localization: ^3.0.8
dependency_overrides:
  test_api: ^0.7.9
  matcher: ^0.12.18
  analyzer: ^6.4.1 # This allows hive_generator and bloc_test to coexist
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter

  
  # Code Generation
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1

  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
    - assets/translations/

  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700